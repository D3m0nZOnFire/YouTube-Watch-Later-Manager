<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 240px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 700;
      color: #f44336;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 0 0 8px;
    }
    .section { margin-bottom: 16px; }
    .section + .section { border-top: 1px solid #1e1e1e; padding-top: 16px; }
    button#go {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: #f44336;
      border: 1.5px solid #f44336;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button#go:hover { background: rgba(244, 67, 54, 0.1); }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .toggle-row label {
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      flex: 1;
      line-height: 1.3;
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      width: 36px;
      height: 20px;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .switch input:checked + .slider { background: rgba(244, 67, 54, 0.25); }
    .switch input:checked + .slider::before { background: #f44336; transform: translateX(16px); }
    footer {
      border-top: 1px solid #1e1e1e;
      padding-top: 12px;
      text-align: center;
    }
    footer a {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: #aaa; }
  </style>
</head>
<body>
  <h2>YouTube Tools</h2>

  <div class="section">
    <div class="section-label">Watch Later</div>
    <button id="go">Open Watch Later</button>
  </div>

  <div class="section">
    <div class="section-label">Filters</div>
    <div class="toggle-row">
      <label for="members-toggle">Hide members-only</label>
      <label class="switch">
        <input type="checkbox" id="members-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <footer>
    <a href="https://github.com/D3m0nZOnFire/Youtube-Tools/issues" target="_blank">Report an issue on GitHub</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
