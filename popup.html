<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      margin: 0;
      padding: 20px 16px 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }
    p {
      font-size: 12px;
      color: #888;
      margin: 0 0 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #f44336;
      border: 1.5px solid #f44336;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: rgba(244, 67, 54, 0.1); }
  </style>
</head>
<body>
  <p>Watch Later cleanup</p>
  <button id="go">Open Watch Later</button>
  <script src="popup.js"></script>
</body>
</html>
